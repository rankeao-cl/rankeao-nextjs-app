      description: 'List all tenants where the authenticated user is a staff member. Returns each tenant''s

        name, slug, logo, the user''s role, and effective grants. Used to populate tenant switcher.

        Requires authentication. No X-Tenant-ID header needed.

        '
      operationId: getMyMemberships
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Memberships
          content:
            application/json:
              schema:
                type: object
                properties:
                  memberships:
                    type: array
                    items:
                      type: object
  /api/v1/tenants/{slug}:
    get:
      tags:
      - Tenants
      summary: Get tenant public profile
      description: 'Get a tenant''s full public profile by slug. Includes schedules, social links, recent reviews,

        and open/closed status. If the caller is authenticated, the response also includes is_following

        to indicate whether the user follows this store. No authentication required.

        '
      operationId: getTenantProfile
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Tenant profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantPublicProfile'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/tenants/{slug}/events:
    get:
      tags:
      - Tenants
      summary: List tenant events
      description: 'List public events for a tenant store. No authentication required.

        Paginated. Returns upcoming and past events associated with the store.

        '
      operationId: listTenantEvents
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
  /api/v1/tenants/{slug}/reviews:
    get:
      tags:
      - Tenants
      summary: List tenant reviews
      description: 'List reviews for a store. Public endpoint, no authentication required. Sort options: newest

        (default), highest, lowest. Response includes review stats with average rating, total count,

        and rating distribution. Paginated.

        '
      operationId: listTenantReviews
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - name: sort
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
                  stats:
                    $ref: '#/components/schemas/ReviewStats'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags:
      - Tenants
      summary: Submit a tenant review
      description: 'Submit a review for a store. Requires authentication. overall_rating (1-5) is required; sub-ratings

        (product_quality, customer_service, atmosphere, value_for_money) are optional and range 1-5.

        Set is_anonymous to true to hide the reviewer''s username.

        '
      operationId: createTenantReview
      security:
      - BearerAuth: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - overall_rating
              properties:
                overall_rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                product_quality:
                  type: integer
                  minimum: 1
                  maximum: 5
                customer_service:
                  type: integer
                  minimum: 1
                  maximum: 5
                atmosphere:
                  type: integer
                  minimum: 1
                  maximum: 5
                value_for_money:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
                is_anonymous:
                  type: boolean
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
  /api/v1/tournaments:
    get:
      tags:
      - Tournaments
      summary: List tournaments
      description: 'Search and list public tournaments with filters and pagination. Supports filtering by

        status, game, format, city, country, ranked flag, date range, and full-text search (q).

        Results are paginated (default 20 per page) and sortable by recent, upcoming, or popular.

        No authentication required.

        '
      operationId: listTournaments
      parameters:
      - name: status
        in: query
        schema:
          type: string
      - name: game
        in: query
        schema:
          type: string
      - name: format
        in: query
        schema:
          type: string
      - name: city
        in: query
        schema:
          type: string
      - name: country
        in: query
        schema:
          type: string
      - name: is_ranked
        in: query
        schema:
          type: boolean
      - name: date_from
        in: query
        schema:
          type: string
          format: date
      - name: date_to
        in: query
        schema:
          type: string
          format: date
      - name: q
        in: query
        schema:
          type: string
      - name: sort
        in: query
        schema:
          type: string
          enum:
          - recent
          - upcoming
          - popular
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Tournament list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournaments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tournament'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags:
      - Tournaments
      summary: Create a tournament
      description: 'Creates a new tournament in DRAFT status. The authenticated user becomes the organizer.

        Requires game_id, format_id, name (3-200 chars), and starts_at (future date).

        Supports Swiss, Single Elimination, Double Elimination, and Round Robin formats.

        Optional fields include best_of (1, 3, or 5), max_rounds (1-20), round_timer_min (10-120),

        visibility (PUBLIC, PRIVATE, UNLISTED), modality, and tier.

        '
      operationId: createTournament
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTournamentRequest'
      responses:
        '201':
          description: Tournament created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournament:
                    $ref: '#/components/schemas/Tournament'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/tournaments/history:
    get:
      tags:
      - Ratings
      summary: Get my tournament history
      description: 'Returns the authenticated user''s own tournament participation history. Same response

        format and filters as the public user history endpoint, but scoped to the caller.

        Auth required.

        '
      operationId: getMyTournamentHistory
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - name: status
        in: query
        schema:
          type: string
      - name: sort
        in: query
        schema:
          type: string
      - name: game
        in: query
        schema:
          type: string
      - name: format
        in: query
        schema:
          type: string
      - name: is_ranked
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: Tournament history
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournaments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tournament'
                  stats:
                    type: object
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
  /api/v1/tournaments/invitations/{token}/accept:
    post:
      tags:
      - Tournaments
      summary: Accept a tournament invitation
      description: 'Accepts a tournament invitation using the unique invitation token received via

        notification or email. Accepting registers the user for the tournament. Auth required.

        '
      operationId: acceptTournamentInvitation
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tournaments/leaderboard:
    get:
      tags:
      - Ratings
      summary: Get rating leaderboard
      description: 'Returns the Glicko-2 rating leaderboard for a specific game and format combination.

        Requires game and format slugs as query parameters. Optionally filter by season

        (defaults to current), country, or city. Paginated (default 25 per page, max 100).

        If authenticated, the response includes my_position with the caller''s ranking.

        '
      operationId: getRatingLeaderboard
      parameters:
      - name: game
        in: query
        required: true
        schema:
          type: string
      - name: format
        in: query
        required: true
        schema:
          type: string
      - name: season
        in: query
        schema:
          type: string
      - name: country
        in: query
        schema:
          type: string
      - name: city
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Leaderboard
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaderboard:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeaderboardEntry'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
  /api/v1/tournaments/ratings/{user_id}:
    get:
      tags:
      - Ratings
      summary: Get user rating profile
      description: 'Returns a user''s Glicko-2 rating profile for a specific game and format, including

        current rating, deviation, peak rating, match record, streaks, rating history over

        time, and a period summary. Use the period parameter to filter history: all (default),

        30d, 90d, 6m, or 1y. No authentication required.

        '
      operationId: getUserRating
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: game
        in: query
        required: true
        schema:
          type: string
      - name: format
        in: query
        required: true
        schema:
          type: string
      - name: period
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Rating profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingProfile'
  /api/v1/tournaments/seasons:
    get:
      tags:
      - Ratings
      summary: List rating seasons
      description: 'Returns all rating seasons with their date ranges and active status. Also includes

        a reference to the current active season. No authentication required.

        '
      operationId: listSeasons
      responses:
        '200':
          description: Seasons
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasons:
                    type: array
                    items:
                      $ref: '#/components/schemas/Season'
                  current:
                    $ref: '#/components/schemas/Season'
  /api/v1/tournaments/seasons/{slug}/snapshots:
    get:
      tags:
      - Ratings
      summary: Get season snapshots
      description: 'Returns the final rating standings snapshot for a closed season. Includes each player''s

        final rating, position, and title earned. Requires game and format slugs.

        Paginated (default 25 per page, max 100). No authentication required.

        '
      operationId: getSeasonSnapshots
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - name: game
        in: query
        required: true
        schema:
          type: string
      - name: format
        in: query
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Snapshots
          content:
            application/json:
              schema:
                type: object
                properties:
                  snapshots:
                    type: array
                    items:
                      type: object
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
  /api/v1/tournaments/users/{user_id}/history:
    get:
      tags:
      - Ratings
      summary: Get user tournament history
      description: 'Returns a user''s public tournament participation history with results, including

        position, record, match points, and rating delta per tournament. Also includes

        aggregate stats (total tournaments, wins, top-4 finishes, win rate). Filterable

        by game, format, ranked status, and status. Paginated (default 25, max 100).

        No authentication required.

        '
      operationId: getUserTournamentHistory
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      - name: status
        in: query
        schema:
          type: string
      - name: sort
        in: query
        schema:
          type: string
      - name: game
        in: query
        schema:
          type: string
      - name: format
        in: query
        schema:
          type: string
      - name: is_ranked
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: Tournament history
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournaments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tournament'
                  stats:
                    type: object
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
  /api/v1/tournaments/{id}:
    get:
      tags:
      - Tournaments
      summary: Get tournament detail
      description: 'Returns full tournament details by public ID or slug, including judges, rounds, prizes,

        and configuration. If the caller provides a valid Bearer token, the response also includes

        a my_registration field with the user''s registration status. No authentication required.

        '
      operationId: getTournament
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          description: Tournament detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournament:
                    $ref: '#/components/schemas/TournamentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - Tournaments
      summary: Update a tournament
      description: 'Updates tournament details using PATCH semantics (only provided fields are changed).

        Only the organizer can update, and only while the tournament is in DRAFT or OPEN status.

        Auth required (organizer only).

        '
      operationId: updateTournament
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTournamentRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournament:
                    $ref: '#/components/schemas/Tournament'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags:
      - Tournaments
      summary: Delete a tournament
      description: 'Cancels a tournament (soft delete). The tournament moves to CANCELLED status from any state.

        Only the organizer can cancel. Auth required (organizer only).

        '
      operationId: deleteTournament
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/v1/tournaments/{id}/check-in:
    post:
      tags:
      - Tournaments
      summary: Check in to a tournament
      description: 'Confirms attendance during the check-in period (tournament must be in CHECK_IN status).

        Players who do not check in before the tournament starts become NO_SHOW. Auth required.

        '
      operationId: checkIn
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tournaments/{id}/close:
    post:
      tags:
      - Tournaments
      summary: Close the tournament
      description: 'Transitions a FINISHED tournament to CLOSED. For ranked tournaments, this triggers

        Glicko-2 rating calculations and updates the leaderboard. This is the terminal state.

        Auth required (organizer only).

        '
      operationId: closeTournament
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          description: Closed
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournament:
                    $ref: '#/components/schemas/Tournament'
  /api/v1/tournaments/{id}/drop:
    post:
      tags:
      - Tournaments
      summary: Drop from a tournament
      description: 'Drops the authenticated user from an active (started) tournament. The player''s status

        changes to DROPPED and they are excluded from future round pairings. Auth required.

        '
      operationId: dropFromTournament
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tournaments/{id}/finish:
    post:
      tags:
      - Tournaments
      summary: Finish the tournament
      description: 'Transitions the tournament from ROUND_COMPLETE to FINISHED after the final round.

        Calculates final standings and positions. Auth required (organizer only).

        '
      operationId: finishTournament
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          description: Finished
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournament:
                    $ref: '#/components/schemas/Tournament'
  /api/v1/tournaments/{id}/invitations:
    post:
      tags:
      - Tournaments
      summary: Send tournament invitations
      description: 'Invites players to a tournament by user IDs and/or email addresses. Required for

        private tournaments where players cannot self-register without an invitation.

        Auth required (organizer only).

        '
      operationId: sendInvitations
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                emails:
                  type: array
                  items:
                    type: string
                    format: email
      responses:
        '201':
          description: Invitations sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitations:
                    type: array
                    items:
                      type: object
  /api/v1/tournaments/{id}/judges:
    post:
      tags:
      - Tournaments
      summary: Add a judge
      description: 'Assigns a user as a judge to the tournament. Judges can report/confirm match results

        (auto-confirmed), resolve disputes, issue penalties, and extend round time.

        Set is_head_judge to true for the head judge role. Auth required (organizer only).

        '
      operationId: addJudge
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - user_id
              properties:
                user_id:
                  type: string
                  format: uuid
                is_head_judge:
                  type: boolean
      responses:
        '201':
          description: Judge added
          content:
            application/json:
              schema:
                type: object
                properties:
                  judge:
                    $ref: '#/components/schemas/Judge'
  /api/v1/tournaments/{id}/judges/{user_id}:
    delete:
      tags:
      - Tournaments
      summary: Remove a judge
      description: 'Removes a judge from the tournament by their user ID.

        Auth required (organizer only).

        '
      operationId: removeJudge
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tournaments/{id}/matches/{match_id}/confirm:
    post:
      tags:
      - Matches
      summary: Confirm match result
      description: 'Confirms a previously reported match result. Must be called by the opposing player

        (the one who did not report) or by a judge/organizer. Once confirmed, the match

        status changes to CONFIRMED and standings are updated. Auth required.

        '
      operationId: confirmMatch
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      - $ref: '#/components/parameters/MatchId'
      responses:
        '200':
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResult'
  /api/v1/tournaments/{id}/matches/{match_id}/dispute:
    post:
      tags:
      - Matches
      summary: Dispute a match result
      description: 'Disputes a reported match result that the player believes is incorrect. A reason

        must be provided. The match status changes to DISPUTED and requires resolution by

        a judge or organizer. Auth required.

        '
      operationId: disputeMatch
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - reason
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Disputed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResult'
  /api/v1/tournaments/{id}/matches/{match_id}/report:
    post:
      tags:
      - Matches
      summary: Report match result
      description: 'Reports the result of a match with game win/loss/draw counts. Can be called by either

        player (if allow_self_report is enabled) or by a judge/organizer. When reported by a

        judge or organizer, the result is auto-confirmed. When self-reported by a player, the

        match status becomes REPORTED and requires opponent confirmation. Auth required.

        '
      operationId: reportMatch
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - player1_wins
              - player2_wins
              - draws
              properties:
                player1_wins:
                  type: integer
                player2_wins:
                  type: integer
                draws:
                  type: integer
      responses:
        '200':
          description: Reported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResult'
  /api/v1/tournaments/{id}/matches/{match_id}/resolve-dispute:
    post:
      tags:
      - Matches
      summary: Resolve a match dispute
      description: 'Resolves a disputed match by providing the correct game scores. Only judges and the

        organizer can resolve disputes. The result is auto-confirmed upon resolution and

        standings are updated. Optional notes can be included for record-keeping.

        Auth required (judge or organizer).

        '
      operationId: resolveDispute
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - player1_wins
              - player2_wins
              - draws
              properties:
                player1_wins:
                  type: integer
                player2_wins:
                  type: integer
                draws:
                  type: integer
                notes:
                  type: string
      responses:
        '200':
          description: Resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchResult'
  /api/v1/tournaments/{id}/my-matches:
    get:
      tags:
      - Tournaments
      summary: Get my matches in a tournament
      description: 'Returns all matches for the authenticated user in the specified tournament, across

        all rounds. Useful for players to review their match history and pending results.

        Auth required.

        '
      operationId: getMyMatches
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          description: My matches
          content:
            application/json:
              schema:
                type: object
                properties:
                  matches:
                    type: array
                    items:
                      $ref: '#/components/schemas/Match'
  /api/v1/tournaments/{id}/next-round:
    post:
      tags:
      - Tournaments
      summary: Advance to next round
      description: 'Advances the tournament from ROUND_COMPLETE to the next ROUND_IN_PROGRESS by generating

        new pairings based on current standings. All matches in the current round must be

        confirmed before advancing. Auth required (organizer only).

        '
      operationId: nextRound
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          description: Next round started
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournament:
                    $ref: '#/components/schemas/Tournament'
  /api/v1/tournaments/{id}/penalties:
    post:
      tags:
      - Matches
      summary: Issue a penalty
      description: 'Issues a penalty to a player in a specific match. Severity levels have side effects:

        WARNING records the infraction only, GAME_LOSS awards +1 game win to the opponent,

        MATCH_LOSS awards the match to the opponent, and DISQUALIFICATION awards the match

        to the opponent and removes the player from the tournament.

        Auth required (judge or organizer).

        '
      operationId: issuePenalty
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - player_id
              - match_id
              - severity
              - reason
              properties:
                player_id:
                  type: string
                  format: uuid
                match_id:
                  type: string
                  format: uuid
                severity:
                  type: string
                  enum:
                  - WARNING
                  - GAME_LOSS
                  - MATCH_LOSS
                  - DISQUALIFICATION
                reason:
                  type: string
                infraction:
                  type: string
                notes:
                  type: string
      responses:
        '201':
          description: Penalty issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  penalty:
                    $ref: '#/components/schemas/Penalty'
  /api/v1/tournaments/{id}/publish:
    post:
      tags:
      - Tournaments
      summary: Publish a tournament
      description: 'Transitions a tournament from DRAFT to OPEN status, making it publicly visible

        and opening player registration. Auth required (organizer only).

        '
      operationId: publishTournament
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          description: Published
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournament:
                    $ref: '#/components/schemas/Tournament'
  /api/v1/tournaments/{id}/register:
    post:
      tags:
      - Tournaments
      summary: Register for a tournament
      description: 'Registers the authenticated user for a tournament. The tournament must be in OPEN or

        CHECK_IN status. Returns 409 if already registered, tournament is full, or registration

        is closed. Private tournaments require a prior invitation (403 otherwise). An optional

        deck_id can be provided. Auth required.

        '
      operationId: registerForTournament
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deck_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  registration:
                    $ref: '#/components/schemas/Registration'
    delete:
      tags:
      - Tournaments
      summary: Unregister from a tournament
      description: 'Removes the authenticated user''s registration from a tournament. Can only be done

        before the tournament starts. Auth required.

        '
      operationId: unregisterFromTournament
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /api/v1/tournaments/{id}/registrations:
    get:
      tags:
      - Tournaments
      summary: List tournament registrations
      description: 'Returns all registrations for a tournament, including each player''s username, status

        (REGISTERED, CHECKED_IN, DROPPED, NO_SHOW), match points, and game win/loss record.

        No authentication required.

        '
      operationId: listRegistrations
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          description: Registrations
          content:
            application/json:
              schema:
                type: object
                properties:
                  registrations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Registration'
  /api/v1/tournaments/{id}/rounds:
    get:
      tags:
      - Tournaments
      summary: List tournament rounds
      description: 'Returns all rounds in a tournament with their status and timing information.

        No authentication required.

        '
      operationId: listRounds
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          description: Rounds
          content:
            application/json:
              schema:
                type: object
                properties:
                  rounds:
                    type: array
                    items:
                      $ref: '#/components/schemas/Round'
  /api/v1/tournaments/{id}/rounds/{round_number}/extend-time:
    post:
      tags:
      - Matches
      summary: Extend round time
      description: 'Extends the time limit for the specified round by the given number of extra minutes.

        The total timer is the original round_timer_min plus all extensions. An optional

        reason can be provided (e.g., "Late start due to venue issue").

        Auth required (judge or organizer).

        '
      operationId: extendRoundTime
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      - name: round_number
        in: path
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - extra_minutes
              properties:
                extra_minutes:
                  type: integer
                reason:
                  type: string
      responses:
        '200':
          description: Time extended
          content:
            application/json:
              schema:
                type: object
                properties:
                  round:
                    $ref: '#/components/schemas/Round'
  /api/v1/tournaments/{id}/rounds/{round_number}/matches:
    get:
      tags:
      - Tournaments
      summary: List matches for a round
      description: 'Returns all matches for a specific round number, including player info, game scores,

        table assignments, match status (PENDING, REPORTED, CONFIRMED, DISPUTED), and bye flags.

        No authentication required.

        '
      operationId: listRoundMatches
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      - name: round_number
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Matches
          content:
            application/json:
              schema:
                type: object
                properties:
                  matches:
                    type: array
                    items:
                      $ref: '#/components/schemas/Match'
  /api/v1/tournaments/{id}/standings:
    get:
      tags:
      - Tournaments
      summary: Get tournament standings
      description: 'Returns tournament standings sorted by position. Includes match points, win/loss/draw

        record, and tiebreaker percentages (OMW%, OGW%, GW%). Use the optional round query

        parameter to get standings as of a specific round. No authentication required.

        '
      operationId: getStandings
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      - name: round
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: Standings
          content:
            application/json:
              schema:
                type: object
                properties:
                  standings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Standing'
  /api/v1/tournaments/{id}/start:
    post:
      tags:
      - Tournaments
      summary: Start the tournament
      description: 'Transitions from CHECK_IN to ROUND_IN_PROGRESS, generating the first round of pairings.

        Players who did not check in are marked as NO_SHOW and excluded from pairings.

        Auth required (organizer only).

        '
      operationId: startTournament
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          description: Started
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournament:
                    $ref: '#/components/schemas/Tournament'
  /api/v1/tournaments/{id}/start-check-in:
    post:
      tags:
      - Tournaments
      summary: Start check-in phase
      description: 'Transitions a tournament from OPEN to CHECK_IN status, opening the check-in window

        for registered players. The check-in duration is controlled by the check_in_minutes

        tournament setting. Auth required (organizer only).

        '
      operationId: startCheckIn
      security:
      - BearerAuth: []
      parameters:
      - $ref: '#/components/parameters/TournamentId'
      responses:
        '200':
          description: Check-in started
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournament:
                    $ref: '#/components/schemas/Tournament'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TournamentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MatchId:
      name: match_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        default: 20
    XTenantId:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Tenant scope header
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    MessageResponse:
      description: Success message
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
  schemas:
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
    RegisterRequest:
      type: object
      required:
      - username
      - email
      - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
    Tournament:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        game:
          type: string
        format:
          type: string
        city:
          type: string
        country:
          type: string
        is_ranked:
          type: boolean
        max_players:
          type: integer
        current_round:
          type: integer
        starts_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    TournamentDetail:
      allOf:
      - $ref: '#/components/schemas/Tournament'
      - type: object
        properties:
          judges:
            type: array
            items:
              $ref: '#/components/schemas/Judge'
          rounds:
            type: array
            items:
              $ref: '#/components/schemas/Round'
          prizes:
            type: array
            items:
              type: object
