openapi: 3.0.3
info:
  title: Rankeao Public API
  description: User-facing API — authentication, tournaments, social, store browsing, marketplace, gamification, catalog,
    and notifications.
  version: 1.0.0
  contact:
    name: Rankeao
    url: https://rankeao.cl
servers:
- url: https://api.rankeao.cl
  description: Production
tags:
- name: Auth
- name: Tournaments
- name: Matches
- name: Ratings
- name: Tenants
- name: Staff
- name: Social
- name: Chat
- name: Clans
- name: Feed
- name: Store
- name: Orders
- name: Marketplace
- name: Listings
- name: Offers
- name: Disputes
- name: Gamification
- name: Badges
- name: Seasons
- name: Catalog
- name: Notifications
- name: Lobby
security: []
paths:
  /api/v1/auth/change-password:
    post:
      tags:
      - Auth
      summary: Change password (authenticated)
      description: 'Changes the authenticated user''s password. Requires the current password

        and the new password (min 8 characters). Returns 400 if the current password

        is incorrect. Requires Bearer token.

        '
      operationId: changePassword
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - current_password
              - new_password
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/forgot-password:
    post:
      tags:
      - Auth
      summary: Forgot password (not implemented)
      description: 'Initiates a password reset flow by sending a reset link to the user''s email.

        Not yet implemented — always returns 501.

        '
      operationId: forgotPassword
      responses:
        '501':
          description: Not implemented
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: Log in with email and password
      description: 'Authenticates a user with email and password, returning an access token and refresh token.

        Returns 401 with INVALID_CREDENTIALS if the email or password is wrong.

        No authentication required.

        '
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/oauth/apple/callback:
    get:
      tags:
      - Auth
      summary: Apple OAuth callback (not implemented)
      description: 'Handles the OAuth2 callback from Apple after the user authorizes.

        Creates or links an account and returns auth tokens.

        Not yet implemented — always returns 501.

        '
      operationId: oauthAppleCallback
      responses:
        '501':
          description: Not implemented
  /api/v1/auth/oauth/discord/callback:
    get:
      tags:
      - Auth
      summary: Discord OAuth callback (not implemented)
      description: 'Handles the OAuth2 callback from Discord after the user authorizes.

        Creates or links an account and returns auth tokens.

        Not yet implemented — always returns 501.

        '
      operationId: oauthDiscordCallback
      responses:
        '501':
          description: Not implemented
  /api/v1/auth/oauth/google/callback:
    get:
      tags:
      - Auth
      summary: Google OAuth callback (not implemented)
      description: 'Handles the OAuth2 callback from Google after the user authorizes.

        Creates or links an account and returns auth tokens.

        Not yet implemented — always returns 501.

        '
      operationId: oauthGoogleCallback
      responses:
        '501':
          description: Not implemented
  /api/v1/auth/refresh:
    post:
      tags:
      - Auth
      summary: Refresh access token
      description: 'Exchanges a valid refresh token for a new access/refresh token pair.

        The old refresh token is revoked upon successful exchange. If the refresh token

        is invalid, expired, or already revoked, returns 401. No authentication required.

        '
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/register:
    post:
      tags:
      - Auth
      summary: Register a new user
      description: 'Creates a new user account and returns an access token plus refresh token.

        Username must be 3-30 characters (alphanumeric + underscores), email must be valid,

        and password must be at least 8 characters. Returns 409 if the email or username is already taken.

        No authentication required.

        '
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/auth/resend-verification:
    post:
      tags:
      - Auth
      summary: Resend verification email
      description: 'Resends the email verification link to the authenticated user''s email address.

        Rate-limited to prevent abuse. Returns 429 if called too frequently.

        Requires Bearer token.

        '
      operationId: resendVerification
      security:
      - BearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/reset-password:
    post:
      tags:
      - Auth
      summary: Reset password (not implemented)
      description: 'Resets the user''s password using a token received via the forgot-password email.

        Not yet implemented — always returns 501.

        '
      operationId: resetPassword
      responses:
        '501':
          description: Not implemented
  /api/v1/auth/verify-email:
    post:
      tags:
      - Auth
      summary: Verify email (not implemented)
      description: 'Verifies the user''s email address using a verification token.

        Not yet implemented — always returns 501.

        '
      operationId: verifyEmail
      responses:
        '501':
          description: Not implemented
  /api/v1/availability/health:
    get:
      tags:
      - Lobby
      summary: Availability service health check
      description: 'Returns the health status of the availability service. No authentication required.

        This is a stub endpoint for the upcoming availability feature.

        '
      operationId: availabilityHealth
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  status:
                    type: string
  /api/v1/catalog/autocomplete:
    get:
      tags:
      - Catalog
      summary: Card name autocomplete
      description: 'Returns fast autocomplete suggestions for card names. Requires a minimum of

        2 characters in the query. Optional game filter. Returns up to 10 results

        by default (max 20). No authentication required.

        '
      operationId: catalogAutocomplete
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 2
      - name: game
        in: query
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
      responses:
        '200':
          description: Autocomplete suggestions
          content:
            application/json:
              schema:
                type: object
  /api/v1/catalog/cards:
    post:
      tags:
      - Catalog
      summary: Create a card (admin)
      description: 'Creates a new card entry in the catalog for a specific game.

        Requires Bearer token with ADMIN grant.

        '
      operationId: createCatalogCard
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCardRequest'
      responses:
        '201':
          description: Card created
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/catalog/cards/search:
    get:
      tags:
      - Catalog
      summary: Full-text card search with facets
      description: 'Full-text or trigram search across all cards in the catalog. Supports filtering by

        game, set, format, card type, rarity, and colors. Returns faceted counts for

        refinement. Paginated (default 20, max 100). No authentication required.

        '
      operationId: searchCatalogCards
      parameters:
      - name: q
        in: query
        schema:
          type: string
      - name: game
        in: query
        schema:
          type: string
      - name: set
        in: query
        schema:
          type: string
      - name: format
        in: query
        schema:
          type: string
      - name: type
        in: query
        schema:
          type: string
      - name: rarity
        in: query
        schema:
          type: string
      - name: colors
        in: query
        schema:
          type: string
      - name: sort
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Search results with facets
          content:
            application/json:
              schema:
                type: object
  /api/v1/catalog/cards/{card_id}:
    get:
      tags:
      - Catalog
      summary: Get card detail with printings and legality
      description: 'Returns full card detail by UUID, including all printings across sets

        and format legality entries. No authentication required.

        '
      operationId: getCatalogCard
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Card detail
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - Catalog
      summary: Update a card (admin)
      description: 'Partially updates a card (name, type_line, oracle_text, mana_cost).

        Only provided fields are changed. Requires Bearer token with ADMIN grant.

        '
      operationId: updateCatalogCard
      security:
      - BearerAuth: []
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type_line:
                  type: string
                oracle_text:
                  type: string
                mana_cost:
                  type: string
      responses:
        '200':
          description: Card updated
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/catalog/cards/{card_id}/legality:
    get:
      tags:
      - Catalog
      summary: Get card format legality
      description: 'Returns all format legality entries for a card (LEGAL, BANNED, RESTRICTED, NOT_LEGAL).

        No authentication required.

        '
      operationId: getCardLegality
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Legality entries
          content:
            application/json:
              schema:
                type: object
    put:
      tags:
      - Catalog
      summary: Batch update card legality (admin)
      description: 'Replaces legality entries for a card. Accepts an array of format_id + status pairs

        where status is one of LEGAL, BANNED, RESTRICTED, NOT_LEGAL.

        Requires Bearer token with ADMIN grant.

        '
      operationId: updateCardLegality
      security:
      - BearerAuth: []
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - entries
              properties:
                entries:
                  type: array
                  items:
                    type: object
                    properties:
                      format_id:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum:
                        - LEGAL
                        - BANNED
                        - RESTRICTED
                        - NOT_LEGAL
      responses:
        '200':
          description: Legality updated
          content:
            application/json:
              schema:
                type: object
  /api/v1/catalog/cards/{card_id}/price-history:
    get:
      tags:
      - Catalog
      summary: Get card price history
      description: 'Returns price statistics (min, avg, max) for a card''s printings.

        Optionally filter to a specific printing via printing_id query parameter.

        No authentication required.

        '
      operationId: cardPriceHistory
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: printing_id
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Price history
          content:
            application/json:
              schema:
                type: object
  /api/v1/catalog/cards/{card_id}/printings:
    get:
      tags:
      - Catalog
      summary: List printings for a card
      description: 'Returns all printings for a card with pagination and optional filtering

        by rarity and foil_only. Default sort is collector_number.

        No authentication required.

        '
      operationId: listCardPrintings
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: rarity
        in: query
        schema:
          type: string
      - name: foil_only
        in: query
        schema:
          type: boolean
      - name: sort
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Printings list
          content:
            application/json:
              schema:
                type: object
    post:
      tags:
      - Catalog
      summary: Create a printing (admin)
      description: 'Creates a new printing of a card in a specific set. Requires set_id, collector_number,

        and rarity. Returns 409 if the collector_number already exists in the set.

        Requires Bearer token with ADMIN grant.

        '
      operationId: createCardPrinting
      security:
      - BearerAuth: []
      parameters:
      - name: card_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - set_id
              - collector_number
              - rarity
              properties:
                set_id:
                  type: string
                  format: uuid
                collector_number:
                  type: string
                rarity:
                  type: string
                image_url:
                  type: string
                is_foil:
                  type: boolean
      responses:
        '201':
          description: Printing created
          content:
            application/json:
              schema:
                type: object
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/catalog/games:
    get:
      tags:
      - Catalog
      summary: List all games
      description: 'Returns all active games in the catalog. Admins may pass include_inactive=true

        to also see inactive games. No authentication required.

        '
      operationId: listCatalogGames
      responses:
        '200':
          description: Games list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogGame'
    post:
      tags:
      - Catalog
      summary: Create a game (admin)
      description: 'Creates a new game entry in the catalog. Slug must be unique (2-50 chars).

        Returns 409 if the slug is already taken.

        Requires Bearer token with ADMIN grant.

        '
      operationId: createCatalogGame
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
      responses:
        '201':
          description: Game created
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/catalog/games/{slug}:
    get:
      tags:
      - Catalog
      summary: Get game detail with formats
      description: 'Returns a single game by slug, including its active formats.

        No authentication required.

        '
      operationId: getCatalogGame
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Game detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/CatalogGame'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - Catalog
      summary: Update a game (admin)
      description: 'Partially updates a game. Only provided fields are changed.

        Requires Bearer token with ADMIN grant.

        '
      operationId: updateCatalogGame
      security:
      - BearerAuth: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                logo_url:
                  type: string
                is_active:
                  type: boolean
      responses:
        '200':
          description: Game updated
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/catalog/games/{slug}/formats:
    get:
      tags:
      - Catalog
      summary: List formats for a game
      description: 'Returns all formats for a game by game slug. Admins may pass include_inactive=true

        to include inactive formats. Supports ranked_only filter.

        No authentication required.

        '
      operationId: listCatalogFormats
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Formats list
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
      - Catalog
      summary: Create a format (admin)
      description: 'Creates a new format under a game. Requires name and slug (unique within the game).

        Returns 409 if the format slug already exists for this game.

        Requires Bearer token with ADMIN grant.

        '
      operationId: createCatalogFormat
      security:
      - BearerAuth: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                is_active:
                  type: boolean
      responses:
        '201':
          description: Format created
          content:
            application/json:
              schema:
                type: object
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/catalog/games/{slug}/formats/{format_slug}:
    patch:
      tags:
      - Catalog
      summary: Update a format (admin)
      description: 'Partially updates a game format. Only provided fields are changed.

        Requires Bearer token with ADMIN grant.

        '
      operationId: updateCatalogFormat
      security:
      - BearerAuth: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - name: format_slug
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                is_active:
                  type: boolean
      responses:
        '200':
          description: Format updated
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'
  /api/v1/catalog/games/{slug}/sets:
    get:
      tags:
      - Catalog
      summary: List sets for a game
      description: 'Returns card sets for a game with pagination, search (by name/code), set_type filter,

        and sorting (release_date_desc, name_asc, etc.). Default 50 per page, max 100.

        No authentication required.

        '
      operationId: listCatalogSets
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      - name: q
        in: query
        schema:
          type: string
      - name: set_type
        in: query
        schema:
          type: string
      - name: sort
        in: query
        schema:
          type: string
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Sets list with pagination
          content:
            application/json:
              schema:
                type: object
    post:
      tags:
      - Catalog
      summary: Create a set (admin)
      description: 'Creates a new card set under a game. Returns 409 if the set code is already taken.

        Requires Bearer token with ADMIN grant.

        '
      operationId: createCatalogSet
      security:
      - BearerAuth: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSetRequest'
      responses:
        '201':
          description: Set created
          content:
            application/json:
              schema:
                type: object
        '409':
          $ref: '#/components/responses/Conflict'
  /api/v1/catalog/import/cards:
    post:
      tags:
      - Catalog
      summary: Bulk import cards with printings (admin)
      description: 'Bulk imports cards with their printings for a game. Uses upsert logic.

        Returns counts of created, updated, and failed entries.

        Requires Bearer token with ADMIN grant.

        '
      operationId: bulkImportCards
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - game_slug
              - cards
              properties:
                game_slug:
                  type: string
                cards:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Import results
          content:
            application/json:
              schema:
                type: object
  /api/v1/catalog/import/legality:
    post:
      tags:
      - Catalog
      summary: Bulk import legality entries (admin)
      description: 'Bulk imports format legality entries. Uses upsert logic on card + format.

        Returns counts of created, updated, and failed entries.

        Requires Bearer token with ADMIN grant.

        '
      operationId: bulkImportLegality
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - entries
              properties:
                entries:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Import results
          content:
            application/json:
              schema:
                type: object
  /api/v1/catalog/import/sets:
    post:
      tags:
      - Catalog
      summary: Bulk import sets (admin)
      description: 'Bulk imports multiple sets for a game. Uses upsert logic (insert or update on code).

        Returns counts of created, updated, and failed entries.

        Requires Bearer token with ADMIN grant.

        '
      operationId: bulkImportSets
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - game_slug
              - sets
              properties:
                game_slug:
                  type: string
                sets:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Import results
          content:
            application/json:
              schema:
                type: object
  /api/v1/catalog/printings/{printing_id}:
    patch:
      tags:
      - Catalog
      summary: Update a printing (admin)
      description: 'Partially updates a card printing (rarity, image_url, is_foil).

